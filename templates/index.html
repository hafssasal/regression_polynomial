<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriIntelligence</title>
    <!-- Modern web font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Neural Network Canvas Base -->
    <canvas id="neuralCanvas"></canvas>

    <main class="dashboard">
        <section class="glass-panel">
            <header class="panel-header">
                <div class="status-badge">
                    <div class="pulse-dot"></div>
                    <span class="mono-text">MOTEUR PRÉDICTIF // ACTIF</span>
                </div>
                <h1 class="title">Agri<span class="highlight">Intelligence</span></h1>
                <p class="subtitle">Réseau de neurones pour l'estimation des rendements agricoles en fonction de
                    l'engrais.</p>
            </header>

            <form method="post" class="ai-form">
                <div class="input-group">
                    <label for="engrais" class="mono-text">ENTRÉE : ENGRAIS (Kg/Ha)</label>
                    <div class="input-wrapper">
                        <input type="number" step="any" name="engrais" id="engrais" value="{{ engrais_value }}"
                            placeholder="Ex: 120.5" required>
                        <div class="input-glow"></div>
                    </div>
                </div>

                <button type="submit" class="btn-predict">
                    <div class="btn-bg"></div>
                    <span class="btn-text">LANCER LA PRÉDICTION</span>
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6" />
                    </svg>
                </button>
            </form>

            {% if result %}
            <div class="result-card fade-in">
                <div class="result-icon-wrapper">
                    <svg class="result-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M11 20A7 7 0 0 1 4 13" />
                        <path d="M7 16a4 4 0 0 1 0-8" />
                        <path d="M12 4a9 9 0 0 1 9 9" />
                        <path d="M17 12a5 5 0 0 1-5 5" />
                        <circle cx="12" cy="12" r="1" />
                    </svg>
                </div>
                <div class="result-content">
                    <span class="mono-text result-label">RENDEMENT ESTIMÉ</span>
                    <h2 class="result-value">{{ result }}</h2>
                </div>
            </div>
            {% endif %}
        </section>
    </main>

    <script>
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Slower movement for mesmerising effect
                this.directionX = (Math.random() - 0.5) * 0.5;
                this.directionY = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = 'rgba(0, 255, 135, 0.8)';
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            // Calculate a good number of particles
            let numberOfParticles = (canvas.width * canvas.height) / 12000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                        + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));

                    if (distance < 15000) {
                        ctx.strokeStyle = 'rgba(0, 255, 135,' + (1 - distance / 15000) + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        window.addEventListener('resize', function () {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>

</html>
